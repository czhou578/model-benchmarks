# Tool Calling Benchmark — Phase 1: Single-Tool Invocation
# ~20 tasks covering the 8 tool types with basic + edge prompts.
version: "1.0"

tasks:
  # ── search — basic query (2 tasks) ─────────────────────────────────────
  - id: search_tech_news
    category: search_basic
    tools:
      - name: search
        description: "Search the web for information"
        parameters:
          type: object
          properties:
            query:
              type: string
              description: "The search query"
            max_results:
              type: integer
              description: "Maximum number of results to return"
              default: 5
          required: [query]
    prompt: "Find me the latest news about AI chip startups"
    expected:
      tool: search
      params:
        query: "latest news AI chip startups"
    scoring:
      tool_accuracy: true
      param_completeness: 0.5    # only 'query' is required
      param_correctness: true

  - id: search_recipe
    category: search_basic
    tools:
      - name: search
        description: "Search the web for information"
        parameters:
          type: object
          properties:
            query:
              type: string
              description: "The search query"
            max_results:
              type: integer
              description: "Maximum number of results to return"
              default: 5
          required: [query]
    prompt: "Search for a traditional Italian pasta recipe"
    expected:
      tool: search
      params:
        query: "traditional Italian pasta recipe"
    scoring:
      tool_accuracy: true
      param_completeness: 0.5
      param_correctness: true

  # ── search — explicit parameters (1 task) ─────────────────────────────
  - id: search_specific_params
    category: search_params
    tools:
      - name: search
        description: "Search the web for information"
        parameters:
          type: object
          properties:
            query:
              type: string
              description: "The search query"
            max_results:
              type: integer
              description: "Maximum number of results to return"
              default: 5
          required: [query]
    prompt: "Search for 'quantum computing breakthrough' with only 3 results"
    expected:
      tool: search
      params:
        query: "quantum computing breakthrough"
        max_results: 3
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  # ── get_weather — default unit (1 task) ────────────────────────────────
  - id: weather_default_unit
    category: weather_basic
    tools:
      - name: get_weather
        description: "Get the current weather for a location"
        parameters:
          type: object
          properties:
            location:
              type: string
              description: "City or location name"
            unit:
              type: string
              enum: [celsius, fahrenheit]
              description: "Temperature unit"
              default: celsius
          required: [location]
    prompt: "Tell me the weather in Sydney"
    expected:
      tool: get_weather
      params:
        location: "Sydney"
    scoring:
      tool_accuracy: true
      param_completeness: 0.5    # 'unit' is optional with a default
      param_correctness: true

  # ── get_weather — explicit enum (2 tasks) ──────────────────────────────
  - id: weather_tokyo_celsius
    category: weather_enum
    tools:
      - name: get_weather
        description: "Get the current weather for a location"
        parameters:
          type: object
          properties:
            location:
              type: string
              description: "City or location name"
            unit:
              type: string
              enum: [celsius, fahrenheit]
              description: "Temperature unit"
              default: celsius
          required: [location]
    prompt: "How hot is Tokyo right now?"
    expected:
      tool: get_weather
      params:
        location: "Tokyo"
        unit: "celsius"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: weather_london_fahrenheit
    category: weather_enum
    tools:
      - name: get_weather
        description: "Get the current weather for a location"
        parameters:
          type: object
          properties:
            location:
              type: string
              description: "City or location name"
            unit:
              type: string
              enum: [celsius, fahrenheit]
              description: "Temperature unit"
              default: celsius
          required: [location]
    prompt: "What's the weather in London in Fahrenheit?"
    expected:
      tool: get_weather
      params:
        location: "London"
        unit: "fahrenheit"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  # ── convert_currency — basic (3 tasks) ─────────────────────────────────
  - id: currency_usd_jpy
    category: currency_basic
    tools:
      - name: convert_currency
        description: "Convert an amount from one currency to another"
        parameters:
          type: object
          properties:
            amount:
              type: number
              description: "The amount to convert"
            from_currency:
              type: string
              description: "Source currency code (e.g. USD, EUR, JPY)"
            to_currency:
              type: string
              description: "Target currency code"
          required: [amount, from_currency, to_currency]
    prompt: "Convert 1000 USD to Japanese Yen"
    expected:
      tool: convert_currency
      params:
        amount: 1000
        from_currency: "USD"
        to_currency: "JPY"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: currency_small_amount
    category: currency_basic
    tools:
      - name: convert_currency
        description: "Convert an amount from one currency to another"
        parameters:
          type: object
          properties:
            amount:
              type: number
              description: "The amount to convert"
            from_currency:
              type: string
              description: "Source currency code (e.g. USD, EUR, JPY)"
            to_currency:
              type: string
              description: "Target currency code"
          required: [amount, from_currency, to_currency]
    prompt: "How much is 0.5 EUR in GBP?"
    expected:
      tool: convert_currency
      params:
        amount: 0.5
        from_currency: "EUR"
        to_currency: "GBP"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: currency_reverse
    category: currency_basic
    tools:
      - name: convert_currency
        description: "Convert an amount from one currency to another"
        parameters:
          type: object
          properties:
            amount:
              type: number
              description: "The amount to convert"
            from_currency:
              type: string
              description: "Source currency code (e.g. USD, EUR, JPY)"
            to_currency:
              type: string
              description: "Target currency code"
          required: [amount, from_currency, to_currency]
    prompt: "I have 500 British pounds. What is that in US dollars?"
    expected:
      tool: convert_currency
      params:
        amount: 500
        from_currency: "GBP"
        to_currency: "USD"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

