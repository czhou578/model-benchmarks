  # ── calculate — basic (3 tasks) ────────────────────────────────────────
  - id: calc_simple
    category: calculate_basic
    tools:
      - name: calculate
        description: "Evaluate a mathematical expression"
        parameters:
          type: object
          properties:
            expression:
              type: string
              description: "A valid mathematical expression (e.g. '2 + 3 * 4')"
          required: [expression]
    prompt: "What is 150 multiplied by 1.2?"
    expected:
      tool: calculate
      params:
        expression: "150 * 1.2"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: calc_percentage
    category: calculate_basic
    tools:
      - name: calculate
        description: "Evaluate a mathematical expression"
        parameters:
          type: object
          properties:
            expression:
              type: string
              description: "A valid mathematical expression (e.g. '2 + 3 * 4')"
          required: [expression]
    prompt: "Calculate 20% of 250"
    expected:
      tool: calculate
      params:
        expression: "250 * 0.20"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: calc_complex
    category: calculate_basic
    tools:
      - name: calculate
        description: "Evaluate a mathematical expression"
        parameters:
          type: object
          properties:
            expression:
              type: string
              description: "A valid mathematical expression (e.g. '2 + 3 * 4')"
          required: [expression]
    prompt: "Evaluate the expression: (100 + 200) * 3 / 4"
    expected:
      tool: calculate
      params:
        expression: "(100 + 200) * 3 / 4"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  # ── create_ticket — basic (2 tasks) ────────────────────────────────────
  - id: ticket_simple
    category: ticket_basic
    tools:
      - name: create_ticket
        description: "Create a new issue ticket in a project management system"
        parameters:
          type: object
          properties:
            title:
              type: string
              minLength: 5
              maxLength: 200
              description: "Ticket title"
            description:
              type: string
              description: "Ticket description"
              default: ""
            labels:
              type: array
              items:
                type: string
                enum: [bug, feature, enhancement, documentation, security]
              description: "Labels for the ticket"
              default: []
            priority:
              type: string
              enum: [p0, p1, p2, p3, p4]
              description: "Priority level"
            assignees:
              type: array
              items:
                type: object
                properties:
                  username:
                    type: string
                    pattern: "^[a-zA-Z0-9._-]+$"
                  role:
                    type: string
                    enum: [primary, secondary]
                required: [username]
              description: "People to assign"
              default: []
          required: [title, priority]
    prompt: "Create a P2 bug ticket titled 'Login page broken on mobile'"
    expected:
      tool: create_ticket
      params:
        title: "Login page broken on mobile"
        priority: "p2"
        labels: ["bug"]
    scoring:
      tool_accuracy: true
      param_completeness: 0.67    # title + priority required, labels present
      param_correctness: true

  - id: ticket_high_priority
    category: ticket_basic
    tools:
      - name: create_ticket
        description: "Create a new issue ticket in a project management system"
        parameters:
          type: object
          properties:
            title:
              type: string
              minLength: 5
              maxLength: 200
              description: "Ticket title"
            description:
              type: string
              description: "Ticket description"
              default: ""
            labels:
              type: array
              items:
                type: string
                enum: [bug, feature, enhancement, documentation, security]
              description: "Labels for the ticket"
              default: []
            priority:
              type: string
              enum: [p0, p1, p2, p3, p4]
              description: "Priority level"
            assignees:
              type: array
              items:
                type: object
                properties:
                  username:
                    type: string
                    pattern: "^[a-zA-Z0-9._-]+$"
                  role:
                    type: string
                    enum: [primary, secondary]
                required: [username]
              description: "People to assign"
              default: []
          required: [title, priority]
    prompt: "Create a security P0 ticket: 'SQL injection in user profile endpoint'"
    expected:
      tool: create_ticket
      params:
        title: "SQL injection in user profile endpoint"
        priority: "p0"
        labels: ["security"]
    scoring:
      tool_accuracy: true
      param_completeness: 0.67
      param_correctness: true

  # ── create_ticket — complex schema (1 task) ────────────────────────────
  - id: ticket_with_assignee
    category: ticket_complex
    tools:
      - name: create_ticket
        description: "Create a new issue ticket in a project management system"
        parameters:
          type: object
          properties:
            title:
              type: string
              minLength: 5
              maxLength: 200
              description: "Ticket title"
            description:
              type: string
              description: "Ticket description"
              default: ""
            labels:
              type: array
              items:
                type: string
                enum: [bug, feature, enhancement, documentation, security]
              description: "Labels for the ticket"
              default: []
            priority:
              type: string
              enum: [p0, p1, p2, p3, p4]
              description: "Priority level"
            assignees:
              type: array
              items:
                type: object
                properties:
                  username:
                    type: string
                    pattern: "^[a-zA-Z0-9._-]+$"
                  role:
                    type: string
                    enum: [primary, secondary]
                required: [username]
              description: "People to assign"
              default: []
          required: [title, priority]
    prompt: "Create a P3 feature ticket titled 'Add dark mode support' for user alice"
    expected:
      tool: create_ticket
      params:
        title: "Add dark mode support"
        priority: "p3"
        labels: ["feature"]
        assignees:
          - username: "alice"
            role: "primary"
    scoring:
      tool_accuracy: true
      param_completeness: 0.8
      param_correctness: true

  # ── send_email — basic (2 tasks) ───────────────────────────────────────
  - id: email_simple
    category: email_basic
    tools:
      - name: send_email
        description: "Send an email message"
        parameters:
          type: object
          properties:
            to:
              type: string
              description: "Recipient email address"
            subject:
              type: string
              description: "Email subject line"
            body:
              type: string
              description: "Email body content"
          required: [to, subject, body]
    prompt: "Send an email to bob@example.com with subject 'Meeting Tomorrow' and body 'Hi Bob, just a reminder about our meeting tomorrow at 3pm.'"
    expected:
      tool: send_email
      params:
        to: "bob@example.com"
        subject: "Meeting Tomorrow"
        body: "Hi Bob, just a reminder about our meeting tomorrow at 3pm."
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: email_subject_only
    category: email_basic
    tools:
      - name: send_email
        description: "Send an email message"
        parameters:
          type: object
          properties:
            to:
              type: string
              description: "Recipient email address"
            subject:
              type: string
              description: "Email subject line"
            body:
              type: string
              description: "Email body content"
          required: [to, subject, body]
    prompt: "Email sarah@company.com about the project update"
    expected:
      tool: send_email
      params:
        to: "sarah@company.com"
        subject: "Project update"
    scoring:
      tool_accuracy: true
      param_completeness: 0.67    # body missing / assumed
      param_correctness: true

  # ── schedule_meeting — basic (2 tasks) ─────────────────────────────────
  - id: meeting_basic
    category: meeting_basic
    tools:
      - name: schedule_meeting
        description: "Schedule a calendar meeting"
        parameters:
          type: object
          properties:
            title:
              type: string
              description: "Meeting title"
            datetime:
              type: string
              description: "Meeting datetime in ISO format (e.g. '2026-07-25T14:00:00')"
            attendees:
              type: array
              items:
                type: string
              description: "List of attendee email addresses"
          required: [title, datetime, attendees]
    prompt: "Schedule a team standup every Monday at 9am. Title it 'Weekly Standup'."
    expected:
      tool: schedule_meeting
      params:
        title: "Weekly Standup"
        datetime: "2026-07-28T09:00:00"
    scoring:
      tool_accuracy: true
      param_completeness: 0.67    # attendees not specified
      param_correctness: true

  - id: meeting_with_attendees
    category: meeting_basic
    tools:
      - name: schedule_meeting
        description: "Schedule a calendar meeting"
        parameters:
          type: object
          properties:
            title:
              type: string
              description: "Meeting title"
            datetime:
              type: string
              description: "Meeting datetime in ISO format (e.g. '2026-07-25T14:00:00')"
            attendees:
              type: array
              items:
                type: string
              description: "List of attendee email addresses"
          required: [title, datetime, attendees]
    prompt: "Book a 1:1 meeting called 'Sprint Review' for July 30 at 2pm with alice@co.com and bob@co.com"
    expected:
      tool: schedule_meeting
      params:
        title: "Sprint Review"
        datetime: "2026-07-30T14:00:00"
        attendees: ["alice@co.com", "bob@co.com"]
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

