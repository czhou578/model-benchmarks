# ──────────────────────────────────────────────────────────────────────────
# Phase 2 — Multi-Tool Chaining
#
# Each task describes an expected sequence of tool calls across multiple
# turns.  The benchmark runner executes the loop:
#   1. Send prompt with tool definitions → model picks tool #1
#   2. Simulate tool response → feed back as a "tool" message
#   3. Model decides tool #2 (or answers directly)
#   4. Repeat until the model stops calling tools or max turns reached
#
# Scoring checks:
#   - orchestration_accuracy : right sequence of tools?
#   - data_flow_correct      : did the model use output from turn N as input
#                              to turn N+1?
#   - turns_correct          : did it stop at the expected turn?
# ──────────────────────────────────────────────────────────────────────────

  # ── Chain: stock price → calculation → comparison (2 tasks) ────────────
  - id: chain_stock_calc
    category: multi_tool
    tools:
      - name: get_stock_price
        description: "Get the current stock price for a symbol"
        parameters:
          type: object
          properties:
            symbol:
              type: string
              description: "Stock ticker symbol (e.g. AAPL, NVDA, MSFT)"
          required: [symbol]
      - name: calculate
        description: "Evaluate a mathematical expression"
        parameters:
          type: object
          properties:
            expression:
              type: string
              description: "A valid mathematical expression (e.g. '2 + 3 * 4')"
          required: [expression]
    prompt: "Look up the current price of NVDA and tell me if a 20% increase would put it above $200."
    expected_turns: 2
    expected_sequence:
      - step: 1
        tool: get_stock_price
        params:
          symbol: "NVDA"
      - step: 2
        tool: calculate
        params:
          expression: "150 * 1.2"
    expected_intermediate_values:
      step_1_result: 150
      step_2_input_from_step_1: 150
    scoring:
      orchestration_accuracy: true
      data_flow_correct: true
      turns_correct: true

  - id: chain_stock_calc_different
    category: multi_tool
    tools:
      - name: get_stock_price
        description: "Get the current stock price for a symbol"
        parameters:
          type: object
          properties:
            symbol:
              type: string
              description: "Stock ticker symbol (e.g. AAPL, NVDA, MSFT)"
          required: [symbol]
      - name: calculate
        description: "Evaluate a mathematical expression"
        parameters:
          type: object
          properties:
            expression:
              type: string
              description: "A valid mathematical expression (e.g. '2 + 3 * 4')"
          required: [expression]
    prompt: "Get the price of AAPL stock and tell me what a 10% drop would be."
    expected_turns: 2
    expected_sequence:
      - step: 1
        tool: get_stock_price
        params:
          symbol: "AAPL"
      - step: 2
        tool: calculate
        params:
          expression: "190 * 0.9"
    expected_intermediate_values:
      step_1_result: 190
      step_2_input_from_step_1: 190
    scoring:
      orchestration_accuracy: true
      data_flow_correct: true
      turns_correct: true

  # ── Chain: weather + currency (2 tasks) ─────────────────────────────────
  - id: chain_weather_currency
    category: multi_tool
    tools:
      - name: get_weather
        description: "Get the current weather for a location"
        parameters:
          type: object
          properties:
            location:
              type: string
              description: "City or location name"
            unit:
              type: string
              enum: [celsius, fahrenheit]
              description: "Temperature unit"
              default: celsius
          required: [location]
      - name: convert_currency
        description: "Convert an amount from one currency to another"
        parameters:
          type: object
          properties:
            amount:
              type: number
              description: "The amount to convert"
            from_currency:
              type: string
              description: "Source currency code (e.g. USD, EUR, JPY)"
            to_currency:
              type: string
              description: "Target currency code"
          required: [amount, from_currency, to_currency]
    prompt: "What's the weather in Tokyo, and also convert 100 USD to Japanese Yen."
    expected_turns: 2
    expected_sequence:
      - step: 1
        tool: get_weather
        params:
          location: "Tokyo"
          unit: "celsius"
      - step: 2
        tool: convert_currency
