            location:
              type: string
              description: "City or location name"
            unit:
              type: string
              enum: [celsius, fahrenheit]
              description: "Temperature unit"
              default: celsius
          required: [location]
    prompt: "How hot is Tokyo right now?"
    expected:
      tool: get_weather
      params:
        location: "Tokyo"
        unit: "celsius"
    scoring:
      tool_accuracy: true
      param_completeness: 1.0
      param_correctness: true

  - id: weather_london_fahrenheit
